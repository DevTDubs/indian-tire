<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tire Launch</title>

<link rel="manifest" href="manifest.json">

<style>
body {
  margin: 0;
  font-family: Arial;
  background: linear-gradient(#111, #222);
  color: white;
  text-align: center;
}

h1 {
  margin-top: 10px;
}

#bar {
  width: 80%;
  height: 20px;
  background: #333;
  margin: 15px auto;
  border-radius: 10px;
  overflow: hidden;
}

#power {
  height: 100%;
  width: 0%;
  background: lime;
}

button {
  padding: 12px 18px;
  font-size: 16px;
  margin: 5px;
  border: none;
  border-radius: 8px;
  background: #00c3ff;
  color: black;
  font-weight: bold;
}

canvas {
  background: #1a1a1a;
  margin-top: 10px;
  border-radius: 10px;
}

.stats {
  margin: 10px;
}
</style>
</head>

<body>

<h1>🛞 Tire Launch</h1>

<div class="stats">
Coins: <span id="coins">0</span> |
High Score: <span id="high">0</span>
</div>

<div id="bar"><div id="power"></div></div>

<button onclick="rev()">Rev</button>
<button onclick="launch()">Launch</button>

<canvas id="canvas" width="320" height="220"></canvas>

<h3>Upgrades</h3>
<button onclick="upgradeEngine()">Engine</button>
<button onclick="upgradeTire()">Tire</button>

<audio id="revSound" src="https://assets.mixkit.co/sfx/preview/mixkit-car-engine-start-1562.mp3"></audio>
<audio id="launchSound" src="https://assets.mixkit.co/sfx/preview/mixkit-fast-small-sweep-transition-166.mp3"></audio>

<script>
let power = 0;
let coins = 0;
let engine = 1;
let tire = 1;
let high = 0;

const powerBar = document.getElementById("power");
const coinsText = document.getElementById("coins");
const highText = document.getElementById("high");

const revSound = document.getElementById("revSound");
const launchSound = document.getElementById("launchSound");

// LOAD SAVE
function load() {
  let save = JSON.parse(localStorage.getItem("tireSave"));
  if (save) {
    coins = save.coins;
    engine = save.engine;
    tire = save.tire;
    high = save.high;
  }
  updateUI();
}

// SAVE
function save() {
  localStorage.setItem("tireSave", JSON.stringify({
    coins, engine, tire, high
  }));
}

function updateUI() {
  coinsText.innerText = coins;
  highText.innerText = high;
}

// REV SYSTEM
let revving = false;

function rev() {
  if (revving) return;

  revSound.currentTime = 0;
  revSound.play();

  revving = true;
  power = 0;

  let interval = setInterval(() => {
    power += 2 + engine * 0.8;

    if (power >= 100) {
      power = 100;
      revving = false;
      clearInterval(interval);
    }

    powerBar.style.width = power + "%";
  }, 40);
}

// PHYSICS LAUNCH
function launch() {
  if (power <= 0) return;

  launchSound.currentTime = 0;
  launchSound.play();

  let speed = power * 0.25 * engine;
  let angle = Math.PI / 4; // 45° ramp

  animate(speed, angle);

  power = 0;
  powerBar.style.width = "0%";
}

// UPGRADES
function upgradeEngine() {
  if (coins >= 50) {
    coins -= 50;
    engine++;
    updateUI();
    save();
  }
}

function upgradeTire() {
  if (coins >= 50) {
    coins -= 50;
    tire++;
    updateUI();
    save();
  }
}

// CANVAS
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

function animate(speed, angle) {
  let x = 40;
  let y = 170;

  let vx = speed * Math.cos(angle);
  let vy = speed * Math.sin(angle);

  let gravity = 0.4;
  let rotation = 0;

  let distance = 0;

  let interval = setInterval(() => {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    // physics
    vy -= gravity;
    x += vx * 0.1;
    y -= vy * 0.1;

    rotation += vx * 0.05;

    if (y >= 170) {
      y = 170;
      clearInterval(interval);

      distance = Math.floor(x * tire);
      let earned = Math.floor(distance / 8);

      coins += earned;

      if (distance > high) {
        high = distance;
      }

      updateUI();
      save();
    }

    // ground
    ctx.fillStyle = "#444";
    ctx.fillRect(0, 180, 320, 40);

    // ramp
    ctx.fillStyle = "#888";
    ctx.beginPath();
    ctx.moveTo(80, 180);
    ctx.lineTo(120, 150);
    ctx.lineTo(140, 180);
    ctx.fill();

    // tire
    ctx.save();
    ctx.translate(x, y);
    ctx.rotate(rotation);

    ctx.beginPath();
    ctx.arc(0, 0, 12, 0, Math.PI * 2);
    ctx.fillStyle = "white";
    ctx.fill();

    ctx.strokeStyle = "black";
    ctx.lineWidth = 3;
    ctx.stroke();

    ctx.restore();

  }, 30);
}

load();
</script>

</body>
</html>
