<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tire Launch ULTRA</title>

<style>
body { margin:0; overflow:hidden; font-family:Arial; background:black;}

#ui {
position:absolute;
bottom:0;
width:100%;
padding:10px;
background:rgba(0,0,0,0.6);
text-align:center;
color:white;
transition:all 0.3s;
}

#bar { width:80%; height:15px; background:#333; margin:10px auto; border-radius:10px;}
#power { height:100%; width:0%; background:lime;}

button {
padding:12px;
margin:5px;
border:none;
border-radius:10px;
background:#00c3ff;
font-weight:bold;
transition:transform 0.1s;
}

button:active { transform:scale(0.9); }

#top {
position:absolute;
top:10px;
width:100%;
text-align:center;
color:white;
font-size:18px;
}
</style>
</head>

<body>

<div id="top">
Coins: <span id="coins">0</span>
</div>

<div id="ui">
<div id="bar"><div id="power"></div></div>
<button id="revBtn">REV</button>
<button id="launchBtn">LAUNCH</button>
</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.158.0/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.158.0/examples/js/loaders/GLTFLoader.js"></script>

<script>
// SCENE
const scene=new THREE.Scene();
scene.background=new THREE.Color(0x87ceeb);

// CAMERA
const camera=new THREE.PerspectiveCamera(70,innerWidth/innerHeight,0.1,2000);
camera.position.set(-12,6,12);

// RENDER
const renderer=new THREE.WebGLRenderer({antialias:true});
renderer.setSize(innerWidth,innerHeight);
document.body.appendChild(renderer.domElement);

// LIGHT
const sun=new THREE.DirectionalLight(0xffffff,1.5);
sun.position.set(20,30,10);
scene.add(sun);
scene.add(new THREE.AmbientLight(0xffffff,0.5));

// TEXTURES
const loader=new THREE.TextureLoader();
const groundTex=loader.load("https://threejs.org/examples/textures/terrain/grasslight-big.jpg");
groundTex.wrapS=groundTex.wrapT=THREE.RepeatWrapping;
groundTex.repeat.set(50,50);

// GROUND
const ground=new THREE.Mesh(
new THREE.PlaneGeometry(2000,200),
new THREE.MeshStandardMaterial({map:groundTex})
);
ground.rotation.x=-Math.PI/2;
scene.add(ground);

// RAMP
const ramp=new THREE.Mesh(
new THREE.BoxGeometry(6,1,3),
new THREE.MeshStandardMaterial({color:0x654321})
);
ramp.position.set(6,1,0);
ramp.rotation.z=-0.4;
scene.add(ramp);

// LOAD MODELS
const gltfLoader=new THREE.GLTFLoader();

let tire, engine;

gltfLoader.load("tire.glb",g=>{
tire=g.scene;
tire.scale.set(0.02,0.02,0.02);
tire.position.set(2,2,0);
scene.add(tire);
});

gltfLoader.load("engine.glb",g=>{
engine=g.scene;
engine.scale.set(2,2,2);
engine.position.set(0,2,0);
scene.add(engine);
});

// AUDIO
const listener=new THREE.AudioListener();
camera.add(listener);

const revSound=new THREE.Audio(listener);
const launchSound=new THREE.Audio(listener);

const audioLoader=new THREE.AudioLoader();

audioLoader.load("https://threejs.org/examples/sounds/358232_j_s_song.mp3",b=>{
revSound.setBuffer(b);
revSound.setLoop(true);
});

audioLoader.load("https://threejs.org/examples/sounds/358232_j_s_song.mp3",b=>{
launchSound.setBuffer(b);
});

// GAME
let power=0, launched=false, vel=new THREE.Vector3();
let coins=0;

const bar=document.getElementById("power");
const coinsText=document.getElementById("coins");

// REV
revBtn.onclick=()=>{
power=0;
revSound.play();

let i=setInterval(()=>{
power+=2;
revSound.setPlaybackRate(0.5+power/100);

if(power>=100){power=100;clearInterval(i);}
bar.style.width=power+"%";
},40);
};

// LAUNCH
launchBtn.onclick=()=>{
if(!tire || launched) return;

launchSound.play();

let speed=power*0.08;
vel.set(speed,speed*0.7,0);
launched=true;

power=0;
bar.style.width="0%";
};

// LOOP
function loop(){
requestAnimationFrame(loop);

if(launched && tire){
vel.y-=0.02;

tire.position.x+=vel.x;
tire.position.y+=vel.y;

camera.position.x+=(tire.position.x-15-camera.position.x)*0.05;
camera.position.y+=(tire.position.y+6-camera.position.y)*0.05;
camera.lookAt(tire.position);

if(tire.position.y<=2){
tire.position.y=2;
vel.set(0,0,0);
launched=false;

coins+=Math.floor(tire.position.x/2);
coinsText.innerText=coins;

// impact shake
camera.position.y+=Math.random()*0.5;
}
}

renderer.render(scene,camera);
}
loop();
</script>

</body>
</html>
