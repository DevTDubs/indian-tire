<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tire Launch</title>

<link rel="manifest" href="manifest.json">

<style>
body {
  margin: 0;
  font-family: Arial;
  background: linear-gradient(#111, #222);
  color: white;
  text-align: center;
}

#bar {
  width: 80%;
  height: 20px;
  background: #333;
  margin: 10px auto;
  border-radius: 10px;
  overflow: hidden;
  position: relative;
}

#power {
  height: 100%;
  width: 0%;
  background: lime;
}

.zone {
  position: absolute;
  height: 100%;
}

.green { background: rgba(0,255,0,0.3); left: 60%; width: 20%; }
.red { background: rgba(255,0,0,0.3); left: 90%; width: 10%; }

button {
  padding: 10px 15px;
  margin: 5px;
  border: none;
  border-radius: 8px;
  font-weight: bold;
  background: #00c3ff;
}

canvas {
  background: #1a1a1a;
  border-radius: 10px;
}
</style>
</head>

<body>

<h2>🛞 Tire Launch</h2>
Coins: <span id="coins">0</span> | High: <span id="high">0</span>

<div id="bar">
  <div class="zone green"></div>
  <div class="zone red"></div>
  <div id="power"></div>
</div>

<button onclick="rev()">Rev</button>
<button onclick="launch()">Launch</button>
<button onclick="boost()">BOOST</button>

<canvas id="canvas" width="320" height="220"></canvas>

<h3>Upgrades</h3>
<button onclick="upgradeEngine()">Engine</button>
<button onclick="upgradeTire()">Tire</button>

<h3>Skins</h3>
<button onclick="setSkin('white')">Default</button>
<button onclick="setSkin('red')">Red (100)</button>
<button onclick="setSkin('gold')">Gold (300)</button>

<script>
let power=0, coins=0, engine=1, tire=1, high=0;
let skin="white";
let boosting=false;

const powerBar=document.getElementById("power");

function save(){
localStorage.setItem("save",JSON.stringify({coins,engine,tire,high,skin}));
}
function load(){
let s=JSON.parse(localStorage.getItem("save"));
if(s){coins=s.coins;engine=s.engine;tire=s.tire;high=s.high;skin=s.skin;}
updateUI();
}
function updateUI(){
coinsText.innerText=coins;
highText.innerText=high;
}
const coinsText=document.getElementById("coins");
const highText=document.getElementById("high");

function rev(){
power=0;
let i=setInterval(()=>{
power+=2+engine;
if(power>=100){power=100;clearInterval(i);}
powerBar.style.width=power+"%";
},40);
}

function launch(){
let multiplier=1;

if(power>60 && power<80){ // PERFECT
multiplier=1.5;
navigator.vibrate?.(100);
}
if(power>90){ multiplier=0.7; }

let speed=power*0.25*engine*multiplier;
animate(speed);

power=0;
powerBar.style.width="0%";
}

function boost(){
boosting=true;
setTimeout(()=>boosting=false,300);
}

function upgradeEngine(){
if(coins>=50){coins-=50;engine++;updateUI();save();}
}
function upgradeTire(){
if(coins>=50){coins-=50;tire++;updateUI();save();}
}

function setSkin(s){
if(s==="red" && coins<100) return;
if(s==="gold" && coins<300) return;
skin=s;
save();
}

const canvas=document.getElementById("canvas");
const ctx=canvas.getContext("2d");

function animate(speed){
let x=0,y=170;
let vx=speed, vy=speed*0.6;
let g=0.4, rot=0;
let cam=0;

let loop=setInterval(()=>{
ctx.clearRect(0,0,320,220);

vy-=g;
if(boosting) vy+=0.8;

x+=vx*0.1;
y-=vy*0.1;
rot+=vx*0.05;

if(y>=170){
y=170;
clearInterval(loop);

let dist=Math.floor(x*tire);
let earn=Math.floor(dist/10);
coins+=earn;

if(dist>high) high=dist;

updateUI();
save();
}

cam=x-80;

// ground
ctx.fillStyle="#444";
ctx.fillRect(-cam,180,2000,40);

// ramp
ctx.fillStyle="#888";
ctx.beginPath();
ctx.moveTo(80-cam,180);
ctx.lineTo(120-cam,150);
ctx.lineTo(140-cam,180);
ctx.fill();

// tire
ctx.save();
ctx.translate(x-cam,y);
ctx.rotate(rot);

ctx.beginPath();
ctx.arc(0,0,12,0,Math.PI*2);
ctx.fillStyle=skin;
ctx.fill();
ctx.stroke();

ctx.restore();

},30);
}

load();
</script>

</body>
</html>
